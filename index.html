<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte partenaires decilo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <section class="locator">
        <div class="panel">

          <div class="intro">
  <h2 class="locator-title">Find a partner near you</h2>

  <p class="locator-subtitle">
    Use our map to find the closest partner.
  </p>
</div>
      
          <div class="search-box">

<div class="search-input-wrap">
<span class="search-icon">
  <svg viewBox="0 0 24 24">
    <path d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/>
  </svg>
</span>

  <input
    id="searchInput"
    type="text"
    placeholder="City or postal code"
  />

  <button
    id="clearSearchBtn"
    class="clear-search-btn"
    type="button">
    ×
  </button>
</div>
          
            <button id="searchBtn">
              <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/></svg></span>
              Search
            </button>
          
            <button id="geoBtn" class="secondary">
              <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 21s7-6.2 7-12A7 7 0 0 0 5 9c0 5.8 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg></span>
              <span>Near me</span>
                                    </button>
          
          </div>
      
<div class="legend">

  <div class="legend-item">
    <span class="legend-dot ear"></span>

    <div class="legend-text">
      <strong>Online Partner</strong>
      <small>For online orders</small>
    </div>
  </div>

  <div class="legend-item">
    <span class="legend-dot certified"></span>

    <div class="legend-text">
      <strong>Online &amp; In-Store Partner</strong>
      <small>For online &amp; in-store orders</small>
    </div>
  </div>

</div> <!-- fin legend -->

</div> <!-- fin panel -->

<div id="map"></div>

<div id="list" class="partner-list"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA99vS9dilMniBjmF11LwQhfZuCc-9brAY&libraries=places&callback=initMap"
  async
  defer>
</script>

</body>
</html>
