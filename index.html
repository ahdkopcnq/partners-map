<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte partenaires decilo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <section class="locator">
        <div class="panel">
          <div class="intro">
            <p class="eyebrow">DECILO NETWORK</p>
            <h1>Find a partner</h1>
            <p>Find a nearby center to have your ear impressions taken.</p>
          </div>
      
          <div class="search-box">
            <input id="searchInput" type="text" placeholder="City or postal code" />
            <button id="searchBtn">Search</button>
            <button id="geoBtn" class="secondary">Use my location</button>
            <button id="resetBtn" class="secondary">Reset search</button>
          </div>
      
          <div class="legend">
            <span><b class="dot certified"></b>decilo Certified Partner</span>
            <span><b class="dot ear"></b>Ear Impressions Partner</span>
          </div>
        </div>
      
        <div id="map"></div>
      
        <div id="list" class="partner-list"></div>
      </section>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA99vS9dilMniBjmF11LwQhfZuCc-9brAY&libraries=places&callback=initMap"
  async
  defer>
</script>

</body>
</html>
